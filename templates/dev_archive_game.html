<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev режим — Архівна гра</title>
    <meta name="theme-color" content="#1f1f1f">
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260404-1') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body
    data-dev-authenticated="{{ 'true' if dev_authenticated else 'false' }}"
    data-dev-login-url="{{ dev_login_path }}"
    data-dev-logout-url="{{ dev_logout_path }}"
    data-dev-preview-url="{{ dev_preview_path }}"
    data-dev-save-url="{{ dev_save_path }}"
>
<div class="create-game-shell">
    <section class="create-game-panel">
        <a href="{{ url_for('index') }}" class="create-game-back">← Назад</a>

        <div class="dev-archive-toolbar">
            <div>
                <h1 class="create-game-title">Dev режим: архівна гра</h1>
                <p class="create-game-subtitle">
                    Створюйте майбутні ігри або замінюйте вже існуючі дати прямо з сайту.
                </p>
            </div>
            <button
                type="button"
                id="devLogoutBtn"
                class="btn-wide dev-archive-logout {% if not dev_authenticated %}hidden{% endif %}"
            >
                Вийти
            </button>
        </div>

        <p class="dev-archive-note">
            Доступ має лише dev-режим з паролем із змінних середовища.
        </p>

        <section id="devLoginSection" class="{% if dev_authenticated %}hidden{% endif %}">
            <form id="devLoginForm" class="create-game-form-page">
                <label for="devPasswordInput" class="create-game-label">Dev пароль</label>
                <input
                    type="password"
                    id="devPasswordInput"
                    class="create-game-input"
                    placeholder="Введіть dev пароль..."
                    autocomplete="current-password"
                    required
                >
                <button type="submit" id="devLoginSubmitBtn" class="btn-wide create-game-submit">Увійти</button>
                <p id="devLoginError" class="create-game-error hidden"></p>
            </form>
        </section>

        <section id="devManagerSection" class="{% if not dev_authenticated %}hidden{% endif %}">
            <form id="devArchiveForm" class="create-game-form-page">
                <label for="devGameDateInput" class="create-game-label">Дата гри</label>
                <input
                    type="date"
                    id="devGameDateInput"
                    class="create-game-input"
                    value="{{ today_kyiv }}"
                    required
                >

                <label for="devSecretWordInput" class="create-game-label">Секретне слово</label>
                <input
                    type="text"
                    id="devSecretWordInput"
                    class="create-game-input"
                    placeholder="Введіть секретне слово..."
                    autocomplete="off"
                    required
                >

                <div class="create-game-actions">
                    <button type="submit" id="devPreviewBtn" class="btn-wide create-game-submit">Показати preview</button>
                    <button type="button" id="devSaveBtn" class="btn-wide dev-archive-save" disabled>Зберегти в архів</button>
                    <a id="devOpenGameLink" class="create-game-open-link hidden" href="#" target="_blank" rel="noopener noreferrer">Відкрити гру</a>
                </div>

                <p id="devArchiveError" class="create-game-error hidden"></p>
                <p id="devArchiveSuccess" class="create-game-copy-status hidden"></p>
            </form>
        </section>
    </section>

    <section id="devArchivePreview" class="create-game-result hidden">
        <h2 class="create-game-result-title">Preview архівної гри</h2>
        <p id="devPreviewSummary" class="create-game-result-subtitle"></p>

        <div id="devPreviewMeta" class="dev-archive-meta-grid"></div>

        <h3 class="create-game-table-title">Перші 500 слів рейтингу</h3>
        <div class="create-game-table-wrap">
            <table class="create-game-table">
                <thead>
                    <tr>
                        <th>Прокс.</th>
                        <th>Слово</th>
                        <th>Similarity</th>
                    </tr>
                </thead>
                <tbody id="devPreviewTopWordsBody"></tbody>
            </table>
        </div>
    </section>
</div>

<script type="module" src="{{ url_for('static', filename='js/dev_archive_game.js', v='20260404-1') }}"></script>
</body>
</html>
