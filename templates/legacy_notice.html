<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Словозв'яз — переїхали на slovozviaz.com</title>
  <link rel="canonical" href="https://slovozviaz.com/">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #1F1F1F; color: #F0F0F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh; min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px; text-align: center;
    }
    .logo {
      font-size: 64px; line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 26px; line-height: 1.25;
      margin: 0 0 14px; font-weight: 700;
      max-width: 460px;
    }
    p {
      font-size: 16px; line-height: 1.55;
      margin: 0 0 24px; max-width: 480px;
      opacity: 0.88;
    }
    .actions {
      display: flex; flex-direction: column;
      gap: 10px; width: 100%; max-width: 320px;
      margin: 8px 0 0;
    }
    .btn {
      display: block; width: 100%;
      padding: 15px 20px;
      border-radius: 12px; text-decoration: none;
      font-size: 16px; font-weight: 600;
      transition: opacity 0.15s, transform 0.05s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; transform: scale(0.99); }
    .btn-primary {
      background: #4285F4; color: #fff;
    }
    .btn-secondary {
      background: transparent; color: #4285F4;
      border: 1px solid #4285F4;
    }
    .footnote {
      font-size: 13px; line-height: 1.5;
      opacity: 0.5; margin-top: 36px;
      max-width: 380px;
    }
    @media (max-height: 520px) {
      .logo { font-size: 48px; margin-bottom: 16px; }
      h1 { font-size: 22px; }
      .footnote { margin-top: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo" aria-hidden="true">📚</div>

    <h1>Словозв'яз переїхав</h1>

    <p>
      Стара адреса більше не підтримується.
      Тепер гра доступна за адресою <strong>slovozviaz.com</strong>.
    </p>

    <div class="actions">
      <a href="https://play.google.com/store/apps/details?id=com.andriikon.slovozviaz"
         class="btn btn-primary"
         rel="noopener">
        Оновити застосунок у Google Play
      </a>

      <a href="https://slovozviaz.com/"
         class="btn btn-secondary"
         rel="noopener">
        Відкрити сайт slovozviaz.com
      </a>
    </div>

    <p class="footnote">
      Якщо ти користуєшся застосунком — оновись через Google Play.<br>
      Якщо у браузері — переходь на slovozviaz.com.
    </p>
  </div>
</body>
</html>
